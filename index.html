<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Zoey — 她记得你说过的每一件事</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Mono:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sans: 'Noto Sans SC', sans-serif;
  --serif: 'Fraunces', serif;
  --mono: 'DM Mono', monospace;
  --amber: #f0a832;
  --radius: 20px;
  --radius-sm: 12px;
}

html, body {
  height: 100%; width: 100%;
  background: #000;
  color: #fff;
  font-family: var(--sans);
  overflow: hidden;
}

/* ── BACKGROUND PHOTO ── */
#bgPhoto {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 100vh; height: 100dvh;
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  z-index: 0;
}
/* Bottom gradient — covers lower 60%, face in upper 40% stays clean */
#bgPhoto::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.96) 0%,
    rgba(0,0,0,0.90) 20%,
    rgba(0,0,0,0.60) 50%,
    transparent 100%
  );
}

/* ── HEADER ── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  padding: env(safe-area-inset-top, 0) 0 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
}
.header-inner {
  max-width: 480px; margin: 0 auto;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
}
.header-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  overflow: hidden; border: 1.5px solid rgba(255,255,255,0.3); flex-shrink: 0;
}
.header-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.header-name { font-size: 0.95rem; font-weight: 400; color: #fff; margin-bottom: 2px; }
.header-status {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: #4caf7d;
  display: flex; align-items: center; gap: 5px;
}
.header-status::before {
  content: ''; width: 5px; height: 5px; background: #4caf7d;
  border-radius: 50%; display: inline-block;
  animation: sPulse 2.5s ease-in-out infinite;
}
@keyframes sPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.header-right {
  margin-left: auto; font-family: var(--mono); font-size: 0.58rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35);
}

/* ── SCROLL CONTAINER ──
   Starts at 44vh — face is in the top ~44%, chat lives below */
.scroll-wrap {
  position: fixed;
  top: 44vh; left: 0; right: 0; bottom: 0;
  z-index: 100; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
}
.scroll-wrap::-webkit-scrollbar { display: none; }

.chat-area {
  max-width: 480px; margin: 0 auto;
  padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 110px);
  display: flex; flex-direction: column; gap: 0;
}

/* ── DATE SEPARATOR ── */
.date-sep {
  align-self: center;
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.30); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 5px 14px; border-radius: 20px; margin: 16px 0 24px;
}

/* ── MESSAGE ROWS ── */
.msg-row {
  display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.msg-row.visible { opacity: 1; transform: translateY(0); }
.msg-row.from-user { flex-direction: row-reverse; }
.msg-row + .msg-row.from-user { margin-top: 8px; }

.msg-avatar-small {
  width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
  object-position: center top; border: 1px solid rgba(255,255,255,0.25); flex-shrink: 0;
}
.msg-avatar-placeholder {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 0.55rem; color: rgba(255,255,255,0.6);
}

/* Glass bubble */
.bubble {
  max-width: 310px; padding: 12px 16px;
  font-size: 0.88rem; line-height: 1.72; font-weight: 300;
}
.from-zoey .bubble {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--radius) var(--radius) var(--radius) 4px; color: #fff;
}
.from-user .bubble {
  background: rgba(240,168,50,0.18);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(240,168,50,0.28);
  border-radius: var(--radius) var(--radius) 4px var(--radius);
  color: rgba(255,255,255,0.88);
}
.bubble em { font-style: italic; color: var(--amber); }
.bubble strong { font-weight: 400; color: var(--amber); }

.msg-time {
  font-family: var(--mono); font-size: 0.52rem; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.3); margin: 3px 0 14px; padding: 0 38px;
}
.from-user.msg-time, .msg-time.from-user { text-align: right; }

/* ── TYPING ── */
.typing-row {
  display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px;
  opacity: 0; transition: opacity 0.35s ease;
}
.typing-row.visible { opacity: 1; }
.typing-bubble {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
  padding: 14px 18px; display: flex; gap: 5px; align-items: center;
}
.dot { width: 5px; height: 5px; background: rgba(255,255,255,0.7); border-radius: 50%; animation: dPulse 1.2s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes dPulse { 0%,60%,100%{opacity:.25;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }

/* ── INNER CARD (inside bubble) ── */
.inner-card {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-left: 2px solid rgba(240,168,50,0.6);
  border-radius: 4px 12px 12px 4px; padding: 12px 14px; margin-bottom: 8px;
}
.inner-card:last-child { margin-bottom: 0; }
.inner-card-tag {
  font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--amber); opacity: 0.8; margin-bottom: 5px;
}
.inner-card-text { color: rgba(255,255,255,0.7); line-height: 1.6; font-size: 0.82rem; font-weight: 300; }

/* ── FEATURE PILLS ── */
.feature-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
.pill {
  background: rgba(240,168,50,0.12); border: 1px solid rgba(240,168,50,0.25);
  border-radius: 20px; padding: 5px 13px;
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--amber);
}

/* ── HIGHLIGHT CARD ── */
.chat-card {
  align-self: stretch;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm);
  padding: 18px 20px; margin: 16px 0;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.chat-card.visible { opacity: 1; transform: translateY(0); }
.chat-card-label {
  font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(240,168,50,0.8); margin-bottom: 8px;
}
.chat-card-text { font-family: var(--serif); font-size: 1.05rem; font-weight: 300; color: #fff; line-height: 1.55; }
.chat-card-text em { font-style: italic; color: var(--amber); }

/* ── MUTE BUTTON ── */
.mute-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px; border-radius: 50%; transition: opacity 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.mute-btn:hover { opacity: 0.7; }
.mute-btn svg { display: block; }

/* ── INPUT BAR ── */
.input-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 16px);
  background: linear-gradient(to top, rgba(0,0,0,0.90) 0%, transparent 100%);
}
.input-inner { max-width: 480px; margin: 0 auto; display: flex; gap: 10px; align-items: center; }
.input-box {
  flex: 1; background: rgba(255,255,255,0.12);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.18); border-radius: 28px;
  padding: 13px 20px; font-size: 0.88rem; color: #fff;
  font-family: var(--sans); font-weight: 300; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.input-box:focus { border-color: rgba(240,168,50,0.5); background: rgba(255,255,255,0.15); }
.input-box::placeholder { color: rgba(255,255,255,0.3); }
.send-btn {
  width: 46px; height: 46px; background: var(--amber); border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: transform 0.15s, background 0.2s;
}
.send-btn:hover, .send-btn:active { background: #f5b94a; transform: scale(1.06); }

/* ── MIC BUTTON ── */
.mic-btn {
  width: 46px; height: 46px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.22); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  position: relative;
}
.mic-btn.listening {
  background: rgba(240,50,50,0.25);
  border-color: rgba(240,80,80,0.6);
  animation: micPulse 1.2s ease-in-out infinite;
}
.mic-btn.listening::before {
  content: '';
  position: absolute; inset: -6px;
  border-radius: 50%; border: 1.5px solid rgba(240,80,80,0.35);
  animation: micRing 1.2s ease-in-out infinite;
}
@keyframes micPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
@keyframes micRing {
  0% { opacity: 0.8; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.5); }
}

/* ── LISTENING LABEL ── */
.listening-label {
  display: none;
  max-width: 480px; margin: 0 auto;
  text-align: center;
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: rgba(240,100,100,0.9);
  margin-top: 8px;
}
.listening-label.active { display: block; }

.input-note {
  font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.22);
  text-align: center; margin-top: 8px;
  max-width: 480px; margin-left: auto; margin-right: auto;
}

/* ── START OVERLAY ── */
#startOverlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
}
#startBtn {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 40px;
  padding: 16px 44px;
  color: #fff;
  font-family: var(--sans);
  font-size: 1rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  display: flex; align-items: center; gap: 10px;
}
#startBtn:hover, #startBtn:active {
  background: rgba(255,255,255,0.22);
  transform: scale(1.04);
}
#startBtn svg { flex-shrink: 0; }
</style>
</head>
<body>

<div id="bgPhoto"></div>

<!-- Start overlay — tap to unlock audio and begin -->
<div id="startOverlay">
  <button id="startBtn" onclick="startConversation()">
    <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
      <line x1="1" y1="6.5" x2="1" y2="9.5" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="5.5" y1="4" x2="5.5" y2="12" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="1" x2="10" y2="15" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="14.5" y1="4" x2="14.5" y2="12" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
      <line x1="19" y1="6" x2="19" y2="10" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
    </svg>
    开始与 Zoey 对话
  </button>
</div>

<div class="header">
  <div class="header-inner">
    <div class="header-avatar"><img id="hAvatar" src="" alt="Zoey"></div>
    <div>
      <div class="header-name">沈知意 Zoey <span style="font-size:0.65rem;font-weight:300;opacity:0.6;letter-spacing:0.05em;">首席助理候选人</span></div>
      <div class="header-status">随时在线</div>
    </div>
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="静音切换">
      <svg id="muteIcon" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M3.5 7.5h2.5l3.5-3v11l-3.5-3H3.5V7.5z" stroke="rgba(255,255,255,0.75)" stroke-width="1.3" stroke-linejoin="round" fill="rgba(255,255,255,0.2)"/>
        <path d="M13.5 7.2a4.2 4.2 0 010 5.6" stroke="rgba(255,255,255,0.75)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M15.8 4.8a7.2 7.2 0 010 10.4" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
  </div>
</div>

<div class="scroll-wrap" id="scrollWrap">
  <div class="chat-area" id="chatArea">

    <div class="date-sep">今天 · 第一次对话</div>

  </div>
</div>

<div class="input-bar">
  <div class="input-inner">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" style="display:none">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="6.25" y="1.25" width="5.5" height="9" rx="2.75" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
        <path d="M3.5 9a5.5 5.5 0 0011 0" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="9" y1="14.5" x2="9" y2="16.5" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="6.5" y1="16.5" x2="11.5" y2="16.5" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <input class="input-box" type="text" id="inputBox" placeholder="输入消息，或点击麦克风说话...">
    <button class="send-btn" onclick="handleSend()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 9h12M11 5l4 4-4 4" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <p class="listening-label" id="listeningLabel">● 正在聆听...</p>
  <p class="input-note" id="inputNote">iOS 版本即将上线 · 免费开始 · 数据只属于你</p>
</div>

<script>
// ── Setup ──
const BASE = 'https://raw.githubusercontent.com/warren-wupeng/warren-audio-briefings/main/audio/';

// ── Audio (pre-generated MP3 via edge-tts) ──
let muted = false;
let currentAudio = null;

// playAudio(file, onDone) — plays an MP3 file, calls onDone when finished
function playAudio(file, onDone) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  if (muted || !file) {
    if (onDone) setTimeout(onDone, 300);
    return;
  }
  const audio = new Audio(file);
  currentAudio = audio;
  let called = false;
  const fallback = setTimeout(() => finish(), 35000);
  function finish() {
    if (called) return;
    called = true;
    clearTimeout(fallback);
    currentAudio = null;
    if (onDone) setTimeout(onDone, 500);
  }
  audio.onended = finish;
  audio.onerror = finish;
  audio.play().catch(finish);
}

function toggleMute() {
  muted = !muted;
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  const icon = document.getElementById('muteIcon');
  if (muted) {
    icon.innerHTML = `<path d="M3.5 7.5h2.5l3.5-3v11l-3.5-3H3.5V7.5z" stroke="rgba(255,255,255,0.3)" stroke-width="1.3" stroke-linejoin="round" fill="rgba(255,255,255,0.07)"/>
      <line x1="13" y1="6.5" x2="18" y2="13.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="6.5" x2="13" y2="13.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>`;
  } else {
    icon.innerHTML = `<path d="M3.5 7.5h2.5l3.5-3v11l-3.5-3H3.5V7.5z" stroke="rgba(255,255,255,0.75)" stroke-width="1.3" stroke-linejoin="round" fill="rgba(255,255,255,0.2)"/>
      <path d="M13.5 7.2a4.2 4.2 0 010 5.6" stroke="rgba(255,255,255,0.75)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      <path d="M15.8 4.8a7.2 7.2 0 010 10.4" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round" fill="none"/>`;
  }
}

// ── STT (user speaks) ──
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognition) {
  document.getElementById('micBtn').style.display = 'flex';
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('listeningLabel').classList.add('active');
    document.getElementById('inputNote').style.display = 'none';
    document.getElementById('inputBox').placeholder = '说话中...';
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('inputBox').value = final || interim;
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('listeningLabel').classList.remove('active');
    document.getElementById('inputNote').style.display = '';
    document.getElementById('inputBox').placeholder = '输入消息，或点击麦克风说话...';
    const val = document.getElementById('inputBox').value.trim();
    if (val) handleSend();
  };

  recognition.onerror = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('listeningLabel').classList.remove('active');
    document.getElementById('inputNote').style.display = '';
  };
}

function toggleMic() {
  if (!recognition) return;
  if (isListening) {
    recognition.stop();
  } else {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    recognition.start();
  }
}
const BGS  = ['bg-cafe-casual.jpg','bg-cafe-chic.jpg','bg-cafe-confident.jpg','bg-cafe-elegant.jpg','bg-cafe-gentle.jpg','bg-cafe-warm.jpg','bg-library.jpg','bg-park.jpg'];
const n    = new Date();
const bgIdx = Math.floor(Math.random() * BGS.length);
document.getElementById('bgPhoto').style.backgroundImage = `url('${BASE+BGS[bgIdx]}')`;
const AVATAR = BASE + 'zoey-avatar.jpg';
document.getElementById('hAvatar').src = AVATAR;

const area = document.getElementById('chatArea');
const sw   = document.getElementById('scrollWrap');

function scrollBottom() { sw.scrollTo({ top: sw.scrollHeight, behavior: 'smooth' }); }

// ── Message queue ──
// Each item: { type, html, readMs, typingMs }

// ── Sequential runner ──
function makeTyping() {
  const tr = document.createElement('div');
  tr.className = 'typing-row visible';
  tr.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  return tr;
}

function addTimeStamp(cls, last) {
  const t = document.createElement('p');
  t.className = 'msg-time' + (cls ? ' ' + cls : '');
  if (last) t.style.marginBottom = '40px';
  t.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  area.appendChild(t);
}

function runQueue(idx) {
  if (idx >= MSGS.length) return;
  const m = MSGS[idx];

  function showMsg() {
    // Remove typing indicator if present
    const existing = area.querySelector('.typing-row');
    if (existing) existing.remove();

    if (m.type === 'card') {
      const card = document.createElement('div');
      card.className = 'chat-card';
      card.innerHTML = m.html;
      area.appendChild(card);
      requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
    } else {
      const row = document.createElement('div');
      row.className = 'msg-row from-' + m.type + (m.pills ? ' pills-row' : '');
      if (m.type === 'zoey') {
        const avatarStyle = m.pills ? 'opacity:0;pointer-events:none' : '';
        const bubbleStyle = m.pills ? 'background:transparent;border:none;padding:4px 0 0' : '';
        row.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top;${avatarStyle}"><div class="bubble" style="${bubbleStyle}">${m.html}</div>`;
      } else {
        row.innerHTML = `<div class="msg-avatar-placeholder">你</div><div class="bubble">${m.html}</div>`;
      }
      area.appendChild(row);
      requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('visible')));
      addTimeStamp(m.type === 'user' ? 'from-user' : '', m.last);
    }

    scrollBottom();

    // Zoey messages: wait for audio to finish, then proceed
    // Other messages (user, card, pills): use fixed readMs timer
    if (m.type === 'zoey' && !m.pills && m.readMs > 0) {
      playAudio(m.audioFile, () => runQueue(idx + 1));
    } else if (m.type === 'zoey' && !m.pills && m.readMs === 0) {
      playAudio(m.audioFile, m.cta ? () => setTimeout(showCTAChips, 600) : null);
    } else if (m.readMs > 0) {
      setTimeout(() => runQueue(idx + 1), m.readMs);
    }
  }

  if (m.type === 'zoey' && m.typingMs) {
    const tr = makeTyping();
    area.appendChild(tr);
    scrollBottom();
    setTimeout(showMsg, m.typingMs);
  } else {
    showMsg();
  }
}

// Start only after user taps — required by browser autoplay policy
function startConversation() {
  const overlay = document.getElementById('startOverlay');
  overlay.style.opacity = '0';
  overlay.style.transition = 'opacity 0.4s ease';
  setTimeout(() => overlay.remove(), 400);
  setTimeout(() => runQueue(0), 600);
}

// ── CTA chips ──
function showCTAChips() {
  // Hide input bar
  document.getElementById('inputBar').style.display = 'none';

  const wrap = document.createElement('div');
  wrap.id = 'ctaChips';
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;padding:12px 16px 24px;align-items:flex-end;';

  const hired = document.createElement('button');
  hired.textContent = '你明天来上班吧，试用期一周';
  hired.style.cssText = 'background:var(--amber);color:#1a1408;border:none;border-radius:20px;padding:11px 20px;font-size:0.95rem;font-weight:600;cursor:pointer;max-width:80%;text-align:left;';
  hired.onclick = () => handleChip('hired');

  const wait = document.createElement('button');
  wait.textContent = '先回去等通知吧';
  wait.style.cssText = 'background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:11px 20px;font-size:0.95rem;cursor:pointer;max-width:80%;text-align:left;';
  wait.onclick = () => handleChip('wait');

  wrap.appendChild(hired);
  wrap.appendChild(wait);
  area.appendChild(wrap);
  scrollBottom();
}

function handleChip(choice) {
  document.getElementById('ctaChips').remove();

  const isHired = choice === 'hired';
  const userText = isHired ? '你明天来上班吧，试用期一周' : '先回去等通知吧';

    : '好，我等你消息。想好了，来这里找我。';
  const audioFile = isHired ? 'audio/zoey-cta-hired.mp3' : 'audio/zoey-cta-wait.mp3';

  // User bubble
  const uRow = document.createElement('div');
  uRow.className = 'msg-row from-user visible';
  uRow.style.marginTop = '8px';
  uRow.innerHTML = `<div class="msg-avatar-placeholder">你</div><div class="bubble">${userText}</div>`;
  const uTs = document.createElement('p');
  uTs.className = 'msg-time from-user';
  uTs.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  area.appendChild(uRow);
  area.appendChild(uTs);
  scrollBottom();

  // Zoey typing → reply → link button
  setTimeout(() => {
    const tr = makeTyping();
    area.appendChild(tr);
    scrollBottom();
    setTimeout(() => {
      tr.remove();
      const zRow = document.createElement('div');
      zRow.className = 'msg-row from-zoey visible';
      zRow.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top"><div class="bubble">${zoeyReply}</div>`;
      area.appendChild(zRow);
      addTimeStamp('', false);

      // Link button
      const linkWrap = document.createElement('div');
      linkWrap.style.cssText = 'padding:8px 16px 32px;display:flex;justify-content:flex-end;';
      const link = document.createElement('a');
      link.href = FEISHU_URL;
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = isHired ? '填写联系方式 →' : '想好了来找我 →';
      link.style.cssText = 'display:inline-block;background:var(--amber);color:#1a1408;text-decoration:none;border-radius:20px;padding:11px 24px;font-size:0.95rem;font-weight:600;';
      linkWrap.appendChild(link);
      area.appendChild(linkWrap);

      playAudio(audioFile);

}

// ── Send handler ──
function handleSend() {
  const input = document.getElementById('inputBox');
  const val = input.value.trim();
  if (!val) {
    input.focus();
    input.style.borderColor = 'rgba(240,168,50,0.6)';
    setTimeout(() => input.style.borderColor = '', 700);
    return;
  }

  const row = document.createElement('div');
  row.className = 'msg-row from-user visible';
  row.style.marginTop = '8px';
  row.innerHTML = `<div class="msg-avatar-placeholder">你</div><div class="bubble">${val.replace(/</g,'&lt;')}</div>`;
  const ts = document.createElement('p');
  ts.className = 'msg-time from-user';
  ts.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  area.appendChild(row);
  area.appendChild(ts);
  input.value = '';
  scrollBottom();

  setTimeout(() => {
    const tr = makeTyping();
    area.appendChild(tr);
    scrollBottom();
    setTimeout(() => {
      tr.remove();
      playAudio('audio/zoey-reply.mp3');
      const rr = document.createElement('div');
      rr.className = 'msg-row from-zoey visible';
      rr.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top"><div class="bubble">收到了。我已经记住你了——下次你来，我会认出你的。<br><br>早期名额我帮你登记，后续会联系你。</div>`;
      const rt = document.createElement('p');

      rt.style.marginBottom = '40px';
      rt.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
      area.appendChild(rr);
      area.appendChild(rt);
      scrollBottom();
    }, 1800);
  }, 600);
}

document.getElementById('inputBox').addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
