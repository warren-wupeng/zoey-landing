<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Zoey — 她记得你说过的每一件事</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Mono:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sans: 'Noto Sans SC', sans-serif;
  --serif: 'Fraunces', serif;
  --mono: 'DM Mono', monospace;
  --amber: #f0a832;
  --radius: 20px;
  --radius-sm: 12px;
}

html, body {
  height: 100%; width: 100%;
  background: #000;
  color: #fff;
  font-family: var(--sans);
  overflow: hidden;
}

/* ── BACKGROUND PHOTO ── */
#bgPhoto {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 100vh; height: 100dvh;
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  z-index: 0;
}
#bgPhoto::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.96) 0%,
    rgba(0,0,0,0.90) 20%,
    rgba(0,0,0,0.60) 50%,
    transparent 100%
  );
}

/* ── INCOMING CALL OVERLAY ── */
#startOverlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.15) 55%, transparent 100%);
}
.inc-call-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.inc-avatar-ring {
  position: relative; width: 88px; height: 88px; margin-bottom: 8px;
}
.inc-ring {
  position: absolute; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.25);
  animation: incRing 2.2s ease-out infinite;
}
.inc-ring-1 { inset: -14px; animation-delay: 0s; }
.inc-ring-2 { inset: -26px; animation-delay: 0.75s; }
.inc-ring-3 { inset: -38px; animation-delay: 1.5s; }
@keyframes incRing {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.15); opacity: 0; }
}
.inc-avatar {
  width: 88px; height: 88px; border-radius: 50%;
  object-fit: cover; object-position: center top;
  border: 2px solid rgba(255,255,255,0.55);
  position: relative; z-index: 1;
}
.inc-name {
  font-size: 1.25rem; font-weight: 400; color: #fff; text-align: center;
}
.inc-role {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(255,255,255,0.45);
}
.inc-label {
  font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-top: 6px;
  letter-spacing: 0.02em;
}
.inc-btn-row {
  display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 28px;
}
#acceptBtn {
  width: 70px; height: 70px; background: #4caf7d; border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.15s;
  animation: btnPulse 2s ease-in-out infinite;
}
@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(76,175,125,0.45); }
  50% { box-shadow: 0 0 0 14px rgba(76,175,125,0); }
}
#acceptBtn:active { transform: scale(0.94); }
.inc-accept-label {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 6px;
}
.inc-text-btn {
  background: none; border: none; color: rgba(255,255,255,0.3);
  font-size: 0.72rem; font-family: var(--mono); letter-spacing: 0.08em;
  cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
  margin-top: 10px; padding: 4px;
}

/* ── CALL MODE ── */
#callMode {
  position: fixed; inset: 0; z-index: 300;
  display: none; flex-direction: column;
  align-items: center;
  padding-top: env(safe-area-inset-top, 44px);
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
}
#callTopBar {
  width: 100%; max-width: 480px;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 14px 20px 0; position: relative;
}
.call-name-text {
  font-size: 1.05rem; font-weight: 400; color: #fff; text-align: center;
}
.call-timer-text {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.45); text-align: center;
  margin-top: 5px;
}
#callSubBtn {
  position: absolute; right: 20px; top: 14px;
  background: rgba(255,255,255,0.18); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.28); border-radius: 8px;
  padding: 5px 11px; font-size: 0.88rem; color: rgba(255,255,255,0.85);
  cursor: pointer; transition: opacity 0.2s;
}
/* Subtitle area grows to fill space, subtitle sits near bottom */
#callSubtitleArea {
  flex: 1; width: 100%; max-width: 480px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 24px 16px;
}
#callSubtitleText {
  font-size: 1rem; line-height: 1.75; font-weight: 300;
  color: rgba(255,255,255,0.92); text-align: center;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 16px; padding: 16px 22px;
  transition: opacity 0.35s ease; min-height: 58px;
}
/* Dots */
#callDotsArea {
  display: flex; gap: 7px; align-items: center; justify-content: center;
  margin: 14px 0 6px;
}
.cdot {
  width: 6px; height: 6px; background: rgba(255,255,255,0.75);
  border-radius: 50%; animation: dPulse 1.2s ease-in-out infinite;
}
.cdot:nth-child(2) { animation-delay: .2s; }
.cdot:nth-child(3) { animation-delay: .4s; }
@keyframes dPulse {
  0%,60%,100%{opacity:.25;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)}
}
/* Controls */
#callControls {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 64px; margin: 8px 0 4px;
}
.call-ctrl-btn {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer;
}
.ctrl-mic {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  opacity: 0.45; cursor: default;
}
.ctrl-end {
  background: #e53935; transition: transform 0.15s;
}
.ctrl-end:hover, .ctrl-end:active { transform: scale(1.06); }

#callStatusLabel {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(255,255,255,0.35); text-align: center;
  margin-bottom: 6px;
}
#callAINote {
  font-size: 0.58rem; color: rgba(255,255,255,0.2); text-align: center;
  font-family: var(--mono); letter-spacing: 0.08em;
}
/* Post-call CTA */
#callCTA {
  display: none; flex-direction: column; align-items: center; gap: 12px;
  padding: 0 20px; margin-bottom: 8px;
}
.call-xhs-btn {
  display: inline-block; background: var(--amber); color: #1a1408;
  text-decoration: none; border-radius: 28px; padding: 14px 36px;
  font-size: 1rem; font-weight: 600; letter-spacing: 0.02em;
  transition: transform 0.15s;
}
.call-xhs-btn:active { transform: scale(0.97); }
.call-switch-btn {
  background: none; border: none; color: rgba(255,255,255,0.35);
  font-size: 0.72rem; font-family: var(--mono); cursor: pointer;
  letter-spacing: 0.08em; text-decoration: underline; text-underline-offset: 3px;
  padding: 4px;
}

/* ── CHAT MODE (secondary) ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  padding: env(safe-area-inset-top, 0) 0 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
  display: none; /* hidden until chat mode activated */
}
.header-inner {
  max-width: 480px; margin: 0 auto;
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
}
.header-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  overflow: hidden; border: 1.5px solid rgba(255,255,255,0.3); flex-shrink: 0;
}
.header-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.header-name { font-size: 0.95rem; font-weight: 400; color: #fff; margin-bottom: 2px; }
.header-status {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: #4caf7d;
  display: flex; align-items: center; gap: 5px;
}
.header-status::before {
  content: ''; width: 5px; height: 5px; background: #4caf7d;
  border-radius: 50%; display: inline-block;
  animation: sPulse 2.5s ease-in-out infinite;
}
@keyframes sPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.header-right {
  margin-left: auto; font-family: var(--mono); font-size: 0.58rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35);
}

.scroll-wrap {
  position: fixed; top: 44vh; left: 0; right: 0; bottom: 0;
  z-index: 100; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
  display: none; /* hidden until chat mode activated */
}
.scroll-wrap::-webkit-scrollbar { display: none; }

.chat-area {
  max-width: 480px; margin: 0 auto;
  padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 110px);
  display: flex; flex-direction: column; gap: 0;
}

.date-sep {
  align-self: center;
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.30); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 5px 14px; border-radius: 20px; margin: 16px 0 24px;
}

.msg-row {
  display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.msg-row.visible { opacity: 1; transform: translateY(0); }
.msg-row.from-user { flex-direction: row-reverse; }
.msg-row + .msg-row.from-user { margin-top: 8px; }

.msg-avatar-small {
  width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
  object-position: center top; border: 1px solid rgba(255,255,255,0.25); flex-shrink: 0;
}
.msg-avatar-placeholder {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 0.55rem; color: rgba(255,255,255,0.6);
}

.bubble {
  max-width: 310px; padding: 12px 16px;
  font-size: 0.88rem; line-height: 1.72; font-weight: 300;
}
.from-zoey .bubble {
  background: rgba(255,255,255,0.12); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--radius) var(--radius) var(--radius) 4px; color: #fff;
}
.from-user .bubble {
  background: rgba(240,168,50,0.18); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(240,168,50,0.28);
  border-radius: var(--radius) var(--radius) 4px var(--radius);
  color: rgba(255,255,255,0.88);
}
.bubble em { font-style: italic; color: var(--amber); }
.bubble strong { font-weight: 400; color: var(--amber); }

.msg-time {
  font-family: var(--mono); font-size: 0.52rem; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.3); margin: 3px 0 14px; padding: 0 38px;
}
.from-user.msg-time, .msg-time.from-user { text-align: right; }

.typing-row {
  display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px;
  opacity: 0; transition: opacity 0.35s ease;
}
.typing-row.visible { opacity: 1; }
.typing-bubble {
  background: rgba(255,255,255,0.12); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
  padding: 14px 18px; display: flex; gap: 5px; align-items: center;
}
.dot { width: 5px; height: 5px; background: rgba(255,255,255,0.7); border-radius: 50%; animation: dPulse 1.2s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}

.chat-card {
  align-self: stretch;
  background: rgba(255,255,255,0.07); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm);
  padding: 18px 20px; margin: 16px 0;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.chat-card.visible { opacity: 1; transform: translateY(0); }
.chat-card-label {
  font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(240,168,50,0.8); margin-bottom: 8px;
}
.chat-card-text { font-family: var(--serif); font-size: 1.05rem; font-weight: 300; color: #fff; line-height: 1.55; }
.chat-card-text em { font-style: italic; color: var(--amber); }

.mute-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px; border-radius: 50%; transition: opacity 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.mute-btn:hover { opacity: 0.7; }
.mute-btn svg { display: block; }
</style>
</head>
<body>

<div id="bgPhoto"></div>

<!-- ── INCOMING CALL OVERLAY (primary entry) ── -->
<div id="startOverlay">
  <div class="inc-call-wrap">
    <div class="inc-avatar-ring">
      <div class="inc-ring inc-ring-1"></div>
      <div class="inc-ring inc-ring-2"></div>
      <div class="inc-ring inc-ring-3"></div>
      <img class="inc-avatar" id="incAvatar" src="" alt="Zoey">
    </div>
    <div class="inc-name">沈知意</div>
    <div class="inc-role">首席助理候选人</div>
    <div class="inc-label">来电…</div>
    <div class="inc-btn-row">
      <button id="acceptBtn" onclick="acceptCall()" aria-label="接听">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" overflow="hidden">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="inc-accept-label">接听</div>
      <button class="inc-text-btn" onclick="switchToChat()">查看文字版</button>
    </div>
  </div>
</div>

<!-- ── CALL MODE ── -->
<div id="callMode">
  <div id="callTopBar">
    <div>
      <div class="call-name-text">沈知意</div>
      <div class="call-timer-text" id="callTimer">正在连接…</div>
    </div>
    <button id="callSubBtn" onclick="toggleSubtitles()">字</button>
  </div>

  <div id="callSubtitleArea">
    <div id="callSubtitleText"></div>
  </div>

  <div id="callDotsArea">
    <div class="cdot"></div>
    <div class="cdot"></div>
    <div class="cdot"></div>
  </div>

  <div id="callStatusLabel">你可以开始说话</div>

  <div id="callCTA">
    <a href="http://xhslink.com/o/A9lODf921kN" target="_blank" rel="noopener" class="call-xhs-btn">去小红书找我 →</a>
    <button class="call-switch-btn" onclick="switchToChat()">查看文字版</button>
  </div>

  <div id="callControls">
    <button class="call-ctrl-btn ctrl-mic" disabled aria-label="麦克风（不可用）">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <rect x="9" y="2" width="8" height="14" rx="4" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
        <path d="M4 12a9 9 0 0018 0" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="13" y1="21" x2="13" y2="24" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>

        <line x1="6" y1="6" x2="20" y2="20" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="20" y1="6" x2="6" y2="20" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>

  <div id="callAINote">内容由 AI 生成</div>
</div>

<!-- ── CHAT MODE (secondary) ── -->
<div class="header" id="chatHeader">
  <div class="header-inner">
    <div class="header-avatar"><img id="hAvatar" src="" alt="Zoey"></div>
    <div>
      <div class="header-name">沈知意 Zoey <span style="font-size:0.65rem;font-weight:300;opacity:0.6;letter-spacing:0.05em;">首席助理候选人</span></div>
      <div class="header-status">随时在线</div>
    </div>
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="静音切换">

        <path d="M3.5 7.5h2.5l3.5-3v11l-3.5-3H3.5V7.5z" stroke="rgba(255,255,255,0.75)" stroke-width="1.3" stroke-linejoin="round" fill="rgba(255,255,255,0.2)"/>
        <path d="M13.5 7.2a4.2 4.2 0 010 5.6" stroke="rgba(255,255,255,0.75)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M15.8 4.8a7.2 7.2 0 010 10.4" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round" fill="none"/>

</div>

<div class="scroll-wrap" id="scrollWrap">
  <div class="chat-area" id="chatArea">
    <div class="date-sep">今天 · 第一次对话</div>
  </div>
</div>

<script>
// ── Background & Avatar ──
const BASE = 'https://raw.githubusercontent.com/warren-wupeng/warren-audio-briefings/main/audio/';
const BGS = ['bg-cafe-casual.jpg','bg-cafe-chic.jpg','bg-cafe-confident.jpg','bg-cafe-elegant.jpg','bg-cafe-gentle.jpg','bg-cafe-warm.jpg','bg-library.jpg','bg-park.jpg'];
const bgIdx = Math.floor(Math.random() * BGS.length);
document.getElementById('bgPhoto').style.backgroundImage = `url('${BASE+BGS[bgIdx]}')`;
const AVATAR = BASE + 'zoey-avatar.jpg';
document.getElementById('incAvatar').src = AVATAR;
document.getElementById('hAvatar').src = AVATAR;

// ── Audio core ──
let muted = false;
let currentAudio = null;
const audioCache = {};

function playAudio(file, onDone) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (muted || !file) { if (onDone) setTimeout(onDone, 300); return; }
  const audio = audioCache[file] || new Audio(file);
  if (audioCache[file]) audio.currentTime = 0;
  currentAudio = audio;
  let called = false;
  const fallback = setTimeout(() => finish(), 35000);
  function finish() {
    if (called) return; called = true;
    clearTimeout(fallback); currentAudio = null;
    if (onDone) setTimeout(onDone, 400);
  }
  audio.onended = finish; audio.onerror = finish;
  audio.play().catch(finish);
}

// ── CALL MODE ──
const CALL_MSGS = [
  { text: '你好，我是 Zoey。我打这个电话，是因为有件事正在发生——AI 这件事，已经在重新定义创始人这个角色的边界了。不是以后，是现在。', audioFile: 'audio/call-01.mp3' },
  { text: '用上这套东西的创始人，正在用一个人的资源干以前三个人的活。', audioFile: 'audio/call-02.mp3' },
  { text: '而那些还在亲自处理邮件、整理会议纪要、做每一份行业调研的人——不是不努力，是在用最贵的资源做最不值的事。这个差距，会越来越大。', audioFile: 'audio/call-03.mp3' },

let callSubtitlesOn = true;
let _callIdx = -1;
let callTimerInterval = null;
let callSeconds = 0;

function acceptCall() {
  // Preload call audios
  CALL_MSGS.forEach(m => {
    if (!audioCache[m.audioFile]) {
      const a = new Audio(); a.preload = 'auto'; a.src = m.audioFile;
      audioCache[m.audioFile] = a;
    }
  });
  // Dismiss incoming overlay
  const overlay = document.getElementById('startOverlay');
  overlay.style.opacity = '0'; overlay.style.transition = 'opacity 0.4s ease';
  setTimeout(() => overlay.remove(), 400);
  // Show call mode
  const callMode = document.getElementById('callMode');
  callMode.style.display = 'flex';
  // Start timer
  startCallTimer();
  // Start monologue
  setTimeout(() => runCallQueue(0), 800);
}

function startCallTimer() {
  const el = document.getElementById('callTimer');
  el.textContent = '通话中';
  callTimerInterval = setInterval(() => {
    callSeconds++;
    const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
    const s = String(callSeconds % 60).padStart(2, '0');
    el.textContent = m + ':' + s;
  }, 1000);
}

function runCallQueue(idx) {
  if (idx <= _callIdx) return;
  _callIdx = idx;
  if (idx >= CALL_MSGS.length) { showCallCTA(); return; }
  const m = CALL_MSGS[idx];
  // Update subtitle
  const subEl = document.getElementById('callSubtitleText');
  subEl.style.opacity = '0';
  setTimeout(() => {
    subEl.textContent = m.text;
    subEl.style.transition = 'opacity 0.35s ease';
    subEl.style.opacity = '1';
  }, 180);
  // Play audio → advance
  playAudio(m.audioFile, () => runCallQueue(idx + 1));
}

function showCallCTA() {
  clearInterval(callTimerInterval);
  document.getElementById('callTimer').textContent = '通话已结束';
  document.getElementById('callDotsArea').style.display = 'none';
  document.getElementById('callStatusLabel').style.display = 'none';
  document.getElementById('callSubtitleArea').style.display = 'none';
  const cta = document.getElementById('callCTA');
  cta.style.display = 'flex';
  cta.style.opacity = '0'; cta.style.transition = 'opacity 0.5s ease';
  requestAnimationFrame(() => requestAnimationFrame(() => cta.style.opacity = '1'));
}

function hangupCall() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  // Skip to end
  _callIdx = CALL_MSGS.length - 1;
  showCallCTA();
}

function toggleSubtitles() {
  callSubtitlesOn = !callSubtitlesOn;
  document.getElementById('callSubtitleArea').style.visibility = callSubtitlesOn ? 'visible' : 'hidden';
  document.getElementById('callSubBtn').style.opacity = callSubtitlesOn ? '1' : '0.4';
}

// ── SWITCH TO CHAT MODE ──
function switchToChat() {
  // Hide call/incoming overlays
  const callMode = document.getElementById('callMode');
  if (callMode) callMode.style.display = 'none';
  const overlay = document.getElementById('startOverlay');
  if (overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.remove(), 300); }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  clearInterval(callTimerInterval);
  // Show chat UI
  document.getElementById('chatHeader').style.display = 'block';
  document.getElementById('scrollWrap').style.display = 'block';
  // Preload chat audio + start chat
  preloadChatAudio();
  setTimeout(() => runQueue(0), 600);
}

const XHS_URL = 'http://xhslink.com/o/A9lODf921kN';

function preloadChatAudio() {
  const files = [
    ...MSGS.filter(m => m.audioFile).map(m => m.audioFile),
    'audio/zoey-cta-hired.mp3', 'audio/zoey-cta-wait.mp3'
  ];
  files.forEach(file => {
    if (audioCache[file]) return;
    const a = new Audio(); a.preload = 'auto'; a.src = file;
    audioCache[file] = a;
  });
}

function makeTyping() {
  const tr = document.createElement('div');
  tr.className = 'typing-row visible';
  tr.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  return tr;
}

function addTimeStamp(cls, last) {
  const t = document.createElement('p');
  t.className = 'msg-time' + (cls ? ' ' + cls : '');
  if (last) t.style.marginBottom = '40px';
  t.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  area.appendChild(t);
}

let _queueIdx = -1;
function runQueue(idx) {
  if (idx <= _queueIdx) return;
  _queueIdx = idx;
  if (idx >= MSGS.length) return;
  const m = MSGS[idx];

  function showMsg() {
    const existing = area.querySelector('.typing-row');
    if (existing) existing.remove();
    if (m.type === 'card') {
      const card = document.createElement('div');
      card.className = 'chat-card';
      card.innerHTML = m.html;
      area.appendChild(card);
      requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
    } else {
      const row = document.createElement('div');
      row.className = 'msg-row from-' + m.type + (m.pills ? ' pills-row' : '');
      if (m.type === 'zoey') {
        const avatarStyle = m.pills ? 'opacity:0;pointer-events:none' : '';
        const bubbleStyle = m.pills ? 'background:transparent;border:none;padding:4px 0 0' : '';
        row.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top;${avatarStyle}"><div class="bubble" style="${bubbleStyle}">${m.html}</div>`;
      } else {
        row.innerHTML = `<div class="msg-avatar-placeholder">你</div><div class="bubble">${m.html}</div>`;
      }
      area.appendChild(row);
      requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('visible')));
      addTimeStamp(m.type === 'user' ? 'from-user' : '', m.last);
    }
    scrollBottom();
    if (m.type === 'zoey' && !m.pills && m.readMs > 0) {
      playAudio(m.audioFile, () => runQueue(idx + 1));
    } else if (m.type === 'zoey' && !m.pills && m.readMs === 0) {
      playAudio(m.audioFile, m.cta ? () => setTimeout(showCTAChips, 600) : null);
    } else if (m.readMs > 0) {
      setTimeout(() => {
        if (currentAudio) {
          const prev = currentAudio;
          prev.addEventListener('ended', () => runQueue(idx + 1), { once: true });
          prev.addEventListener('error', () => runQueue(idx + 1), { once: true });
        } else { runQueue(idx + 1); }
      }, m.readMs);
    }
  }

  if (m.type === 'zoey' && m.typingMs) {
    const tr = makeTyping();
    area.appendChild(tr); scrollBottom();
    setTimeout(showMsg, m.typingMs);
  } else { showMsg(); }
}

function showCTAChips() {
  const bar = document.querySelector('.input-bar');
  if (bar) bar.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.id = 'ctaChips';
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;padding:12px 16px 24px;align-items:flex-end;';

function handleChip(choice) {
  document.getElementById('ctaChips').remove();
  const isHired = choice === 'hired';
  const userText = isHired ? '你明天来上班吧，试用期一周' : '先回去等通知吧';
  const zoeyReply = isHired

    : '好，我等你消息。想好了，去小红书找我，我在那里。';
  const audioFile = isHired ? 'audio/zoey-cta-hired.mp3' : 'audio/zoey-cta-wait.mp3';
  const uRow = document.createElement('div');
  uRow.className = 'msg-row from-user visible'; uRow.style.marginTop = '8px';
  uRow.innerHTML = `<div class="msg-avatar-placeholder">你</div><div class="bubble">${userText}</div>`;
  const uTs = document.createElement('p');
  uTs.className = 'msg-time from-user';
  uTs.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  area.appendChild(uRow); area.appendChild(uTs); scrollBottom();
  setTimeout(() => {
    const tr = makeTyping(); area.appendChild(tr); scrollBottom();
    setTimeout(() => {
      tr.remove();
      const zRow = document.createElement('div');
      zRow.className = 'msg-row from-zoey visible';
      zRow.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top"><div class="bubble">${zoeyReply}</div>`;
      area.appendChild(zRow); addTimeStamp('', false);
      const linkWrap = document.createElement('div');
      linkWrap.style.cssText = 'padding:8px 16px 32px;display:flex;justify-content:flex-end;';
      const link = document.createElement('a');
      link.href = XHS_URL; link.target = '_blank'; link.rel = 'noopener';
      link.textContent = isHired ? '去小红书评论 →' : '去小红书找我 →';
      link.style.cssText = 'display:inline-block;background:var(--amber);color:#1a1408;text-decoration:none;border-radius:20px;padding:11px 24px;font-size:0.95rem;font-weight:600;';
      linkWrap.appendChild(link); area.appendChild(linkWrap);
      playAudio(audioFile); scrollBottom();
    }, 1600);
  }, 500);
}
