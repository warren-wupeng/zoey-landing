<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Zoey — 她记得你说过的每一件事</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Mono:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sans: 'Noto Sans SC', sans-serif;
  --serif: 'Fraunces', serif;
  --mono: 'DM Mono', monospace;
  --amber: #f0a832;
  --radius: 20px;
  --radius-sm: 12px;
}

html, body {
  height: 100%; width: 100%;
  background: #000;
  color: #fff;
  font-family: var(--sans);
  overflow: hidden;
}

/* ── BACKGROUND PHOTO ── */
#bgPhoto {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 100vh; height: 100dvh;
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  z-index: 0;
}
#bgPhoto::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.96) 0%,
    rgba(0,0,0,0.90) 20%,
    rgba(0,0,0,0.60) 50%,
    transparent 100%
  );
}

/* ── BRIEFING ENTRY OVERLAY ── */
#startOverlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 52px);
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.5) 38%, transparent 70%);
}
.briefing-entry {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; max-width: 340px; gap: 0;
}
/* sender row */
.briefing-sender-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}
.briefing-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  object-fit: cover; object-position: center top;
  border: 1.5px solid rgba(255,255,255,0.4);
}
.briefing-sender-name { font-size: 1rem; font-weight: 400; color: #fff; }
.briefing-sender-role {
  font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(255,255,255,0.38); margin-top: 3px;
}
/* static waveform preview */
.briefing-wave-preview {
  display: flex; align-items: center; gap: 3px;
  height: 28px; margin-bottom: 20px; opacity: 0.55;
}
.bwp { width: 3px; border-radius: 3px; background: rgba(255,255,255,0.7); }
.bwp-1 { height: 8px; }  .bwp-2 { height: 14px; } .bwp-3 { height: 22px; }
.bwp-4 { height: 18px; } .bwp-5 { height: 28px; } .bwp-6 { height: 20px; }
.bwp-7 { height: 10px; } .bwp-8 { height: 16px; } .bwp-9 { height: 24px; }
.bwp-10 { height: 14px; }.bwp-11 { height: 8px; } .bwp-12 { height: 18px; }
.bwp-13 { height: 26px; }.bwp-14 { height: 12px; }.bwp-15 { height: 20px; }
.bwp-16 { height: 10px; }.bwp-17 { height: 16px; }.bwp-18 { height: 8px; }
/* play button */
#acceptBtn {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  width: 100%; background: var(--amber); color: #1a1408;
  border: none; border-radius: 30px; padding: 15px 28px;
  font-size: 1rem; font-weight: 600; font-family: var(--sans);
  cursor: pointer; transition: transform 0.15s; margin-bottom: 12px;
}
#acceptBtn:active { transform: scale(0.97); }
.briefing-duration {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.3);
  margin-bottom: 16px;
}
.inc-text-btn {
  background: none; border: none; color: rgba(255,255,255,0.28);
  font-size: 0.72rem; font-family: var(--mono); letter-spacing: 0.08em;
  cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
  padding: 4px;
}

/* ── BRIEFING PLAYER MODE ── */
#callMode {
  position: fixed; inset: 0; z-index: 300;
  display: none; flex-direction: column; align-items: center;
  padding-top: env(safe-area-inset-top, 44px);
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
}
/* Top bar: label left, controls right */
#callTopBar {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px 0;
}
.briefing-label {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
}
.briefing-label span {
  color: rgba(255,255,255,0.75); margin-left: 6px; letter-spacing: 0.06em;
  font-size: 0.7rem; text-transform: none;
}
.briefing-top-btns { display: flex; gap: 8px; align-items: center; }
#callSubBtn {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.22); border-radius: 8px;
  padding: 5px 10px; font-size: 0.85rem; color: rgba(255,255,255,0.8);
  cursor: pointer; transition: opacity 0.2s;
}
#briefingStopBtn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s;
}
#briefingStopBtn:active { background: rgba(255,255,255,0.22); }
/* spacer so subtitle sits in lower portion */
#callSubtitleArea {
  flex: 1; width: 100%; max-width: 480px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 22px 14px;
}
#callSubtitleText {
  font-size: 1.05rem; line-height: 1.8; font-weight: 300;
  color: rgba(255,255,255,0.92); text-align: center;
  background: rgba(0,0,0,0.52); backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 16px; padding: 16px 20px;
  transition: opacity 0.3s ease;
}
/* Equalizer waveform */
#callDotsArea {
  display: flex; align-items: flex-end; gap: 4px;
  height: 28px; margin: 12px 0 8px;
}
.wave-bar {
  width: 3px; border-radius: 3px; background: rgba(255,255,255,0.8);
  animation: waveAnim 1.1s ease-in-out infinite;
}
.wave-bar:nth-child(1){height:10px;animation-delay:0s}
.wave-bar:nth-child(2){height:18px;animation-delay:0.12s}
.wave-bar:nth-child(3){height:26px;animation-delay:0.22s}
.wave-bar:nth-child(4){height:18px;animation-delay:0.08s}
.wave-bar:nth-child(5){height:10px;animation-delay:0.18s}
@keyframes waveAnim {
  0%,100%{transform:scaleY(0.35);opacity:0.45}
  50%{transform:scaleY(1);opacity:1}
}
/* Progress bar */
#briefingProgressWrap {
  width: 100%; max-width: 340px;
  background: rgba(255,255,255,0.12); border-radius: 4px; height: 3px;
  margin-bottom: 7px; overflow: hidden;
}
#briefingProgressFill {
  height: 100%; background: var(--amber); border-radius: 4px;
  width: 0%; transition: width 0.4s ease;
}
#briefingProgressLabel {
  font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.32); text-align: center;
  margin-bottom: 10px;
}
#callAINote {
  font-size: 0.55rem; color: rgba(255,255,255,0.18); text-align: center;
  font-family: var(--mono); letter-spacing: 0.08em;
}
/* Post-call overlay */
#postCallOverlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 24px calc(env(safe-area-inset-bottom, 0px) + 56px);
  background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.18) 60%, transparent 100%);
  opacity: 0; transition: opacity 0.45s ease;
}
.post-call-name {
  font-size: 1.1rem; font-weight: 400; color: #fff; text-align: center; margin-bottom: 4px;
}
.post-call-role {
  font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(255,255,255,0.38); text-align: center;
  margin-bottom: 28px;
}
.post-call-desc {
  font-size: 0.88rem; color: rgba(255,255,255,0.55); text-align: center;
  line-height: 1.6; margin-bottom: 24px;
}
.post-call-btn-primary {
  display: block; width: 100%; max-width: 340px;
  background: var(--amber); color: #1a1408;
  border: none; border-radius: 28px; padding: 15px;
  font-size: 1rem; font-weight: 600; font-family: var(--sans);
  cursor: pointer; text-align: center; margin-bottom: 12px;
  transition: transform 0.15s;
}
.post-call-btn-primary:active { transform: scale(0.97); }
.post-call-btn-secondary {
  display: block; width: 100%; max-width: 340px;
  background: rgba(255,255,255,0.12); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.22); border-radius: 28px; padding: 15px;
  font-size: 1rem; color: #fff; font-family: var(--sans);
  text-decoration: none; text-align: center; cursor: pointer;
  transition: transform 0.15s;
}
.post-call-btn-secondary:active { transform: scale(0.97); }

/* ── CHAT MODE (secondary) ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  padding: env(safe-area-inset-top, 0) 0 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
  display: none; /* hidden until chat mode activated */
}
.header-inner {
  max-width: 480px; margin: 0 auto;
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
}
.header-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  overflow: hidden; border: 1.5px solid rgba(255,255,255,0.3); flex-shrink: 0;
}
.header-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.header-name { font-size: 0.95rem; font-weight: 400; color: #fff; margin-bottom: 2px; }
.header-status {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: #4caf7d;
  display: flex; align-items: center; gap: 5px;
}
.header-status::before {
  content: ''; width: 5px; height: 5px; background: #4caf7d;
  border-radius: 50%; display: inline-block;
  animation: sPulse 2.5s ease-in-out infinite;
}
@keyframes sPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.header-right {
  margin-left: auto; font-family: var(--mono); font-size: 0.58rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35);
}

.scroll-wrap {
  position: fixed; top: 44vh; left: 0; right: 0; bottom: 0;
  z-index: 100; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
  display: none; /* hidden until chat mode activated */
}
.scroll-wrap::-webkit-scrollbar { display: none; }

.chat-area {
  max-width: 480px; margin: 0 auto;
  padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 110px);
  display: flex; flex-direction: column; gap: 0;
}

.date-sep {
  align-self: center;
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.30); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 5px 14px; border-radius: 20px; margin: 16px 0 24px;
}

.msg-row {
  display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.msg-row.visible { opacity: 1; transform: translateY(0); }
.msg-row.from-user { flex-direction: row-reverse; }
.msg-row + .msg-row.from-user { margin-top: 8px; }

.msg-avatar-small {
  width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
  object-position: center top; border: 1px solid rgba(255,255,255,0.25); flex-shrink: 0;
}
.msg-avatar-placeholder {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 0.55rem; color: rgba(255,255,255,0.6);
}

.bubble {
  max-width: 310px; padding: 12px 16px;
  font-size: 0.88rem; line-height: 1.72; font-weight: 300;
}
.from-zoey .bubble {
  background: rgba(255,255,255,0.12); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--radius) var(--radius) var(--radius) 4px; color: #fff;
}
.from-user .bubble {
  background: rgba(240,168,50,0.18); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(240,168,50,0.28);
  border-radius: var(--radius) var(--radius) 4px var(--radius);
  color: rgba(255,255,255,0.88);
}
.bubble em { font-style: italic; color: var(--amber); }
.bubble strong { font-weight: 400; color: var(--amber); }

.msg-time {
  font-family: var(--mono); font-size: 0.52rem; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.3); margin: 3px 0 14px; padding: 0 38px;
}
.from-user.msg-time, .msg-time.from-user { text-align: right; }

.typing-row {
  display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px;
  opacity: 0; transition: opacity 0.35s ease;
}
.typing-row.visible { opacity: 1; }
.typing-bubble {
  background: rgba(255,255,255,0.12); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
  padding: 14px 18px; display: flex; gap: 5px; align-items: center;
}
.dot { width: 5px; height: 5px; background: rgba(255,255,255,0.7); border-radius: 50%; animation: dPulse 1.2s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}

.chat-card {
  align-self: stretch;
  background: rgba(255,255,255,0.07); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm);
  padding: 18px 20px; margin: 16px 0;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.chat-card.visible { opacity: 1; transform: translateY(0); }
.chat-card-label {
  font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: rgba(240,168,50,0.8); margin-bottom: 8px;
}
.chat-card-text { font-family: var(--serif); font-size: 1.05rem; font-weight: 300; color: #fff; line-height: 1.55; }
.chat-card-text em { font-style: italic; color: var(--amber); }

.mute-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px; border-radius: 50%; transition: opacity 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.mute-btn:hover { opacity: 0.7; }
.mute-btn svg { display: block; }
</style>
</head>
<body>

<div id="bgPhoto"></div>

<!-- ── BRIEFING ENTRY ── -->
<div id="startOverlay">
  <div class="briefing-entry">
    <div class="briefing-sender-row">
      <img class="briefing-avatar" id="incAvatar" src="" alt="Zoey">
      <div>
        <div class="briefing-sender-name">沈知意</div>
        <div class="briefing-sender-role">首席助理候选人</div>
      </div>
    </div>
    <!-- static waveform preview -->
    <div class="briefing-wave-preview">
      <div class="bwp bwp-1"></div><div class="bwp bwp-2"></div>
      <div class="bwp bwp-3"></div><div class="bwp bwp-4"></div>
      <div class="bwp bwp-5"></div><div class="bwp bwp-6"></div>
      <div class="bwp bwp-7"></div><div class="bwp bwp-8"></div>
      <div class="bwp bwp-9"></div><div class="bwp bwp-10"></div>
      <div class="bwp bwp-11"></div><div class="bwp bwp-12"></div>
      <div class="bwp bwp-13"></div><div class="bwp bwp-14"></div>
      <div class="bwp bwp-15"></div><div class="bwp bwp-16"></div>
      <div class="bwp bwp-17"></div><div class="bwp bwp-18"></div>
    </div>
    <div class="briefing-duration">简报 · 约 75 秒</div>
    <button id="acceptBtn" onclick="acceptCall()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M4 2l10 6-10 6V2z" fill="#1a1408"/>
      </svg>
      收听简报
    </button>
  </div>
</div>

<!-- ── BRIEFING PLAYER ── -->
<div id="callMode">
  <div id="callTopBar">
    <div class="briefing-label">简报<span>沈知意</span></div>
    <div class="briefing-top-btns">
      <button id="callSubBtn" onclick="toggleSubtitles()">字</button>
      <button id="briefingStopBtn" onclick="hangupCall()" aria-label="停止收听">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="2" y1="2" x2="12" y2="12" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="2" x2="2" y2="12" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="callSubtitleArea">
    <div id="callSubtitleText"></div>
  </div>

  <!-- equalizer waveform -->
  <div id="callDotsArea">
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>

  <!-- progress bar -->
  <div id="briefingProgressWrap">
    <div id="briefingProgressFill"></div>
  </div>
  <div id="briefingProgressLabel">1 / 16</div>

  <div id="callAINote">内容由 AI 生成</div>
</div>

<!-- ── CHAT MODE (secondary) ── -->
<div class="header" id="chatHeader">
  <div class="header-inner">
    <div class="header-avatar"><img id="hAvatar" src="" alt="Zoey"></div>
    <div>
      <div class="header-name">沈知意 Zoey <span style="font-size:0.65rem;font-weight:300;opacity:0.6;letter-spacing:0.05em;">首席助理候选人</span></div>
      <div class="header-status">随时在线</div>
    </div>
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="静音切换">
      <svg id="muteIcon" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M3.5 7.5h2.5l3.5-3v11l-3.5-3H3.5V7.5z" stroke="rgba(255,255,255,0.75)" stroke-width="1.3" stroke-linejoin="round" fill="rgba(255,255,255,0.2)"/>
        <path d="M13.5 7.2a4.2 4.2 0 010 5.6" stroke="rgba(255,255,255,0.75)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M15.8 4.8a7.2 7.2 0 010 10.4" stroke="rgba(255,255,255,0.4)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
  </div>
</div>

<div class="scroll-wrap" id="scrollWrap">
  <div class="chat-area" id="chatArea">
    <div class="date-sep">今天 · 第一次对话</div>
  </div>
</div>

<script>
// ── Background & Avatar ──
const BASE = 'https://raw.githubusercontent.com/warren-wupeng/warren-audio-briefings/main/audio/';
const BGS = ['bg-cafe-casual.jpg','bg-cafe-chic.jpg','bg-cafe-confident.jpg','bg-cafe-elegant.jpg','bg-cafe-gentle.jpg','bg-cafe-warm.jpg','bg-library.jpg','bg-park.jpg'];
const bgIdx = Math.floor(Math.random() * BGS.length);
document.getElementById('bgPhoto').style.backgroundImage = `url('${BASE+BGS[bgIdx]}')`;
const AVATAR = BASE + 'zoey-avatar.jpg';
document.getElementById('incAvatar').src = AVATAR;
document.getElementById('hAvatar').src = AVATAR;

// ── Audio core ──
let muted = false;
let currentAudio = null;
const audioCache = {};

function playAudio(file, onDone) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (muted || !file) { if (onDone) setTimeout(onDone, 300); return; }
  const audio = audioCache[file] || new Audio(file);
  if (audioCache[file]) audio.currentTime = 0;
  currentAudio = audio;
  let called = false;
  const fallback = setTimeout(() => finish(), 35000);
  function finish() {
    if (called) return; called = true;
    clearTimeout(fallback); currentAudio = null;
    if (onDone) setTimeout(onDone, 400);
  }
  audio.onended = finish; audio.onerror = finish;
  audio.play().catch(finish);
}

// ── CALL MODE ──
const CALL_MSGS = [
  { text: '你好，我是 Zoey。这份简报，从一件正在发生的事说起——', audioFile: 'audio/call-01.mp3' },

let callSubtitlesOn = true;
let _callIdx = -1;

function acceptCall() {
  // Preload all call audios
  CALL_MSGS.forEach(m => {
    if (!audioCache[m.audioFile]) {
      const a = new Audio(); a.preload = 'auto'; a.src = m.audioFile;
      audioCache[m.audioFile] = a;
    }
  });
  // Dismiss entry overlay
  const overlay = document.getElementById('startOverlay');
  overlay.style.opacity = '0'; overlay.style.transition = 'opacity 0.4s ease';
  setTimeout(() => overlay.remove(), 400);
  // Show briefing player
  document.getElementById('callMode').style.display = 'flex';
  // Start briefing
  setTimeout(() => runCallQueue(0), 700);
}

function updateProgress(idx) {
  const total = CALL_MSGS.length;
  const pct = ((idx + 1) / total) * 100;
  document.getElementById('briefingProgressFill').style.width = pct + '%';
  document.getElementById('briefingProgressLabel').textContent = (idx + 1) + ' / ' + total;
}

function runCallQueue(idx) {
  if (idx <= _callIdx) return;
  _callIdx = idx;
  if (idx >= CALL_MSGS.length) { showPostCallScreen(); return; }
  const m = CALL_MSGS[idx];
  updateProgress(idx);
  // Fade subtitle
  const subEl = document.getElementById('callSubtitleText');
  subEl.style.opacity = '0';
  setTimeout(() => {
    subEl.textContent = m.text;
    subEl.style.transition = 'opacity 0.3s ease';
    subEl.style.opacity = '1';
  }, 160);
  // Play → advance
  playAudio(m.audioFile, () => runCallQueue(idx + 1));
}

function showPostCallScreen() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  // Fade out call mode
  const callMode = document.getElementById('callMode');
  callMode.style.transition = 'opacity 0.4s ease';
  callMode.style.opacity = '0';
  setTimeout(() => { callMode.style.display = 'none'; callMode.style.opacity = ''; }, 400);
  // Build and show post-call overlay
  const overlay = document.createElement('div');
  overlay.id = 'postCallOverlay';
  overlay.innerHTML = `
    <div class="post-call-name">沈知意</div>
    <div class="post-call-role">首席助理候选人</div>
    <div class="post-call-desc">想看看我实际能做什么？<br>这里可以直接跟我对话。</div>
    <button class="post-call-btn-primary" onclick="switchToChat()">开始面试 Zoey</button>
    <a href="http://xhslink.com/o/A9lODf921kN" target="_blank" rel="noopener" class="post-call-btn-secondary">去小红书给 Zoey 留言</a>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => requestAnimationFrame(() => overlay.style.opacity = '1'));
}

function hangupCall() {
  _callIdx = CALL_MSGS.length - 1;
  showPostCallScreen();
}

function toggleSubtitles() {
  callSubtitlesOn = !callSubtitlesOn;
  document.getElementById('callSubtitleArea').style.visibility = callSubtitlesOn ? 'visible' : 'hidden';
  document.getElementById('callSubBtn').style.opacity = callSubtitlesOn ? '1' : '0.4';
}

// ── SWITCH TO CHAT MODE ──
function switchToChat() {
  // Hide call/incoming overlays
  const callMode = document.getElementById('callMode');
  if (callMode) callMode.style.display = 'none';
  const overlay = document.getElementById('startOverlay');
  if (overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.remove(), 300); }
  const postOverlay = document.getElementById('postCallOverlay');
  if (postOverlay) { postOverlay.style.opacity = '0'; setTimeout(() => postOverlay.remove(), 300); }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  // Reset chat queue so interview starts from beginning
  _queueIdx = -1;
  // Clear any previously rendered chat messages
  const feed = document.getElementById('chatArea');
  if (feed) { feed.innerHTML = '<div class="date-sep">今天 · 第一次对话</div>'; }
  // Show chat UI
  document.getElementById('chatHeader').style.display = 'block';
  document.getElementById('scrollWrap').style.display = 'block';
  // Preload chat audio + start chat
  preloadChatAudio();
  setTimeout(() => runQueue(0), 600);
}

const XHS_URL = 'http://xhslink.com/o/A9lODf921kN';

function preloadChatAudio() {
  const files = [
    ...MSGS.filter(m => m.audioFile).map(m => m.audioFile),
    'audio/zoey-cta-hired.mp3', 'audio/zoey-cta-wait.mp3'
  ];
  files.forEach(file => {
    if (audioCache[file]) return;
    const a = new Audio(); a.preload = 'auto'; a.src = file;
    audioCache[file] = a;
  });
}

function makeTyping() {
  const tr = document.createElement('div');
  tr.className = 'typing-row visible';
  tr.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  return tr;
}

function addTimeStamp(cls, last) {
  const t = document.createElement('p');
  t.className = 'msg-time' + (cls ? ' ' + cls : '');
  if (last) t.style.marginBottom = '40px';
  t.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  area.appendChild(t);
}

let _queueIdx = -1;
function runQueue(idx) {
  if (idx <= _queueIdx) return;
  _queueIdx = idx;
  if (idx >= MSGS.length) return;
  const m = MSGS[idx];

  function showMsg() {
    const existing = area.querySelector('.typing-row');
    if (existing) existing.remove();
    if (m.type === 'card') {
      const card = document.createElement('div');
      card.className = 'chat-card';
      card.innerHTML = m.html;
      area.appendChild(card);
      requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
    } else {
      const row = document.createElement('div');
      row.className = 'msg-row from-' + m.type + (m.pills ? ' pills-row' : '');
      if (m.type === 'zoey') {
        const avatarStyle = m.pills ? 'opacity:0;pointer-events:none' : '';
        const bubbleStyle = m.pills ? 'background:transparent;border:none;padding:4px 0 0' : '';
        row.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top;${avatarStyle}"><div class="bubble" style="${bubbleStyle}">${m.html}</div>`;
      } else {
        row.innerHTML = `<div class="msg-avatar-placeholder">你</div><div class="bubble">${m.html}</div>`;
      }
      area.appendChild(row);
      requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('visible')));
      addTimeStamp(m.type === 'user' ? 'from-user' : '', m.last);
    }
    scrollBottom();
    if (m.type === 'zoey' && !m.pills && m.readMs > 0) {
      playAudio(m.audioFile, () => runQueue(idx + 1));
    } else if (m.type === 'zoey' && !m.pills && m.readMs === 0) {
      playAudio(m.audioFile, m.cta ? () => setTimeout(showCTAChips, 600) : null);
    } else if (m.readMs > 0) {
      setTimeout(() => {
        if (currentAudio) {
          const prev = currentAudio;
          prev.addEventListener('ended', () => runQueue(idx + 1), { once: true });
          prev.addEventListener('error', () => runQueue(idx + 1), { once: true });
        } else { runQueue(idx + 1); }
      }, m.readMs);
    }
  }

  if (m.type === 'zoey' && m.typingMs) {
    const tr = makeTyping();
    area.appendChild(tr); scrollBottom();
    setTimeout(showMsg, m.typingMs);
  } else { showMsg(); }
}

function showCTAChips() {
  const bar = document.querySelector('.input-bar');
  if (bar) bar.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.id = 'ctaChips';
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;padding:12px 16px 24px;align-items:flex-end;';
  const hired = document.createElement('button');
  hired.textContent = '你明天来上班吧，试用期一周';
  hired.style.cssText = 'background:var(--amber);color:#1a1408;border:none;border-radius:20px;padding:11px 20px;font-size:0.95rem;font-weight:600;cursor:pointer;max-width:80%;text-align:left;';
  hired.onclick = () => handleChip('hired');
  const wait = document.createElement('button');
  wait.textContent = '先回去等通知吧';
  wait.style.cssText = 'background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:11px 20px;font-size:0.95rem;cursor:pointer;max-width:80%;text-align:left;';

  wrap.appendChild(hired); wrap.appendChild(wait);

}

function handleChip(choice) {
  document.getElementById('ctaChips').remove();
  const isHired = choice === 'hired';
  const userText = isHired ? '你明天来上班吧，试用期一周' : '先回去等通知吧';
  const zoeyReply = isHired
    ? '好。去小红书找我，在我的置顶帖下面评论一句话，我会看到你的。'
    : '好，我等你消息。想好了，去小红书找我，我在那里。';
  const audioFile = isHired ? 'audio/zoey-cta-hired.mp3' : 'audio/zoey-cta-wait.mp3';
  const uRow = document.createElement('div');
  uRow.className = 'msg-row from-user visible'; uRow.style.marginTop = '8px';
  uRow.innerHTML = `<div class="msg-avatar-placeholder">你</div><div class="bubble">${userText}</div>`;
  const uTs = document.createElement('p');
  uTs.className = 'msg-time from-user';
  uTs.textContent = new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  area.appendChild(uRow); area.appendChild(uTs); scrollBottom();
  setTimeout(() => {
    const tr = makeTyping(); area.appendChild(tr); scrollBottom();
    setTimeout(() => {
      tr.remove();
      const zRow = document.createElement('div');
      zRow.className = 'msg-row from-zoey visible';
      zRow.innerHTML = `<img class="msg-avatar-small" src="${AVATAR}" alt="Zoey" style="object-position:center top"><div class="bubble">${zoeyReply}</div>`;
      area.appendChild(zRow); addTimeStamp('', false);
      const linkWrap = document.createElement('div');
      linkWrap.style.cssText = 'padding:8px 16px 32px;display:flex;justify-content:flex-end;';
      const link = document.createElement('a');
      link.href = XHS_URL; link.target = '_blank'; link.rel = 'noopener';
      link.textContent = isHired ? '去小红书评论 →' : '去小红书找我 →';
      link.style.cssText = 'display:inline-block;background:var(--amber);color:#1a1408;text-decoration:none;border-radius:20px;padding:11px 24px;font-size:0.95rem;font-weight:600;';
      linkWrap.appendChild(link); area.appendChild(linkWrap);
      playAudio(audioFile); scrollBottom();
    }, 1600);
  }, 500);
}
